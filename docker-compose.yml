    # Zipkin
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - ph_network
    restart: always
    environment:
      - SELF_TRACING_ENABLED=false
      - SELF_TRACING_FLUSH_INTERVAL=0
    healthcheck:
      test: wget -q --spider http://localhost:9411/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

