services:

  # Config Server
  config_server:
    image: "herman87/ph_configserver:latest"
    container_name: ph-configserver
    ports:
      - "8081:8081"
    networks:
      - ph_network
    restart: always
    environment:
      - HOME=/tmp
      - SPRING_CLOUD_CONFIG_SERVER_GIT_BASEDIR=/tmp/config-repo
      - SPRING_APPLICATION_NAME=config-server
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=git
      - MANAGEMENT_TRACING_ENABLED=false
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=
      - SPRING_ZIPKIN_ENABLED=false
    healthcheck:
      test: sh -c 'wget -q --spider http://localhost:8081/actuator/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s

