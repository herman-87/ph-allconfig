server:
  port: "8083"

spring:
  application:
    name: "gateway"

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "OPTIONS"
            allowed-headers: "*"
            allow-credentials: false

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: "user"
          uri: "lb://user"
          predicates:
            - "Path=/user/**"
          filters:
            - "RewritePath=/user/(?<segment>.*), /${segment}"
