server:
  port: "8082"

spring:
  application:
    name: "discovery"

eureka:
  instance:
    hostname: discovery
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://discovery:8082/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 10000