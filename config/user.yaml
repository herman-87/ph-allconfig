spring:
  application:
    name: "${SPRING_APPLICATION_NAME:user}"
  datasource:
    driver-class-name: "org.postgresql.Driver"
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    hikari:
      maximum-pool-size: "${HIKARI_MAXIMUM_POOL_SIZE:9}"
      connection-timeout: 60000
      initialization-fail-timeout: 60000
      minimum-idle: 3
      connection-test-query: "SELECT 1"
  jpa:
    hibernate:
      ddl-auto: "${JPA_HIBERNATE_DDL_AUTO:validate}"
    show-sql: false
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.PostgreSQLDialect"
  liquibase:
    change-log: "classpath:db/changelog/master.xml"
    clear-check-sums: true
    enabled: true

server:
  port: "${SERVER_PORT:8084}"

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery:8761/eureka/}"
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  zipkin:
    tracing:
      endpoint: "${ZIPKIN_ENDPOINT}"
  tracing:
    sampling:
      probability: 1.0